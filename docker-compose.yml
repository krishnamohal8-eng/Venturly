version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: venturly
      POSTGRES_USER: venturly
      POSTGRES_PASSWORD: venturly_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U venturly"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://venturly:venturly_pass@postgres:5432/venturly
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change_me_in_production
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  seed:
    build: ./backend
    command: npm run seed
    environment:
      DATABASE_URL: postgresql://venturly:venturly_pass@postgres:5432/venturly
    depends_on:
      backend:
        condition: service_healthy
    restart: "no"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      backend:
        condition: service_healthy
